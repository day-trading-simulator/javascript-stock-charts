<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>StockChart v2.0 - Demo</title>
    <link href="stock-chart.css" rel="stylesheet" />
</head>
<body style="margin: 20px; font-family: Arial, sans-serif;">
    <h2>StockChart v2.0 Demo</h2>

    <h4>Candlestick - Dark Mode (Daily)</h4>
    <div id="chart1" style="max-width:1000px; height:500px;"></div>

    <h4>Candlestick - Dark Mode (1 Minute)</h4>
    <div id="chart2" style="max-width:1000px; height:500px;"></div>

    <h4>Line - Light Mode (Hourly)</h4>
    <div id="chart3" style="max-width:1000px; height:500px;"></div>

    <script src="indicators.js"></script>
    <script src="patterns.js"></script>
    <script src="stock-chart.js"></script>
    <script>
        (function () {
            function generateRandomStockData(count, timeframe) {
                count = count || 300;
                timeframe = timeframe || 'day';
                var data = [];
                var now = new Date();
                var price = 100 + Math.random() * 100;
                var volatility = 1.5;
                var timeIncrement = 24 * 60 * 60 * 1000;
                switch (timeframe) {
                    case '1min': timeIncrement = 60 * 1000; break;
                    case '5min': timeIncrement = 5 * 60 * 1000; break;
                    case '15min': timeIncrement = 15 * 60 * 1000; break;
                    case 'hour': timeIncrement = 60 * 60 * 1000; break;
                    case '4hour': timeIncrement = 4 * 60 * 60 * 1000; break;
                    case 'week': timeIncrement = 7 * 24 * 60 * 60 * 1000; break;
                }
                for (var i = 0; i < count; i++) {
                    var t = now.getTime() - (count - i) * timeIncrement;
                    var change = (Math.random() - 0.5) * volatility;
                    var open = price;
                    price = price * (1 + change / 100);
                    var close = price;
                    var high = Math.max(open, close) * (1 + Math.random() * 0.01);
                    var low = Math.min(open, close) * (1 - Math.random() * 0.01);
                    var volume = Math.floor(Math.random() * 1e6) + 500000;
                    var date = new Date(t).toLocaleString('en-US', {
                        timeZone: 'America/New_York',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    }).replace(',', '');
                    data.push({ date: date, t: t, open: open, high: high, low: low, close: close, volume: volume });
                }
                return data;
            }

            window.StockChartLib = {
                StockChart: StockChart
            };

            document.addEventListener('DOMContentLoaded', function () {
                var data1 = generateRandomStockData(300, 'day');
                new StockChart('chart1', {
                    chartType: 'candlestick',
                    darkMode: true,
                    data: data1,
                    ticker: 'AAPL',
                    timeframe: '1day'
                });

                var data2 = generateRandomStockData(300, '1min');
                new StockChart('chart2', {
                    chartType: 'candlestick',
                    darkMode: true,
                    data: data2,
                    ticker: 'TSLA',
                    timeframe: '1min'
                });

                var data3 = generateRandomStockData(300, 'hour');
                new StockChart('chart3', {
                    chartType: 'line',
                    darkMode: false,
                    data: data3,
                    ticker: 'MSFT',
                    timeframe: '1hour'
                });
            });
        })();
    </script>
</body>
</html>
